name: AI Docs Generator

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          echo "files=$(git diff --name-only HEAD~1 HEAD | grep '^src/' || true)" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install axios

      - name: Generate docs with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FILES: ${{ steps.changed.outputs.files }}
        run: |
          node << 'EOF'
          const fs = require("fs");
          const axios = require("axios");

          const files = process.env.FILES.split("\n").filter(Boolean);
          const apiKey = process.env.GEMINI_API_KEY;

          if (!files.length) {
            console.log("No files changed");
            process.exit(0);
          }

          const code = files.map(f => {
            return `
            FILE: ${f}
            ${fs.readFileSync(f, "utf8")}
            `;
          }).join("\n");

          const prompt = `
          Analyze the following source code changes and generate
          developer documentation in Markdown.

          Requirements:

          - Explain the module responsibilities
          - Document functions/classes
          - Provide usage examples
          - Generate a Mermaid architecture diagram

          Output clean Markdown.

          Code:
          ${code}
          `;

          async function run() {

            const res = await axios.post(
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey,
              {
                contents: [
                  {
                    parts: [{ text: prompt }]
                  }
                ]
              }
            );

            const text = res.data.candidates[0].content.parts[0].text;

            if (!fs.existsSync("docs/modules"))
              fs.mkdirSync("docs/modules", { recursive: true });

            fs.writeFileSync("docs/modules/auto-generated.md", text);

          }

          run();
          EOF

      - name: Commit docs
        run: |
          git config --global user.name "ai-docs-bot"
          git config --global user.email "bot@example.com"
          git add docs
          git commit -m "docs: update AI generated documentation" || echo "no changes"
          git push